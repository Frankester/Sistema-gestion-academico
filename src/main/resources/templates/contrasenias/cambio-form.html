<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta http-equiv="Content-Type" charset="UTF-8" content="text/html;">
    <title th:text="#{contrasenias.olvido.form.title}"></title>

    <link rel="stylesheet" th:href="@{/css/base.css}">
    <link rel="stylesheet" th:href="@{/css/form.css}">
</head>
<body>
    <main class="container">
        <h1 class="section-title" th:text="#{contrasenias.olvido.form.heading}"></h1>

        <th:block th:replace="~{utils/mensaje-error :: error(${error})}" />

        <div class="form-card">
            <form th:action="@{'/contrasenias/'+${idCambioContrasenia}}"
                  method="post"
                  th:object="${contraseniaForm}"
            >
                <div class="form-group">
                    <label for="password" th:text="#{label.contrasenia.nueva}">Contraseña nueva</label>
                    <input type="password"
                           th:field="*{contraseniaNueva}"
                           th:placeholder="#{label.contrasenia.nueva.input}"
                           required
                           autofocus
                    />
                    <span class="red"
                          th:if="${#fields.hasErrors('contraseniaNueva')}"
                          th:errors="*{contraseniaNueva}"></span>
                </div>

                <th:block th:replace="~{utils/button-guardar :: btn-guardar}" />

            </form>
        </div>

    </main>

    <footer th:replace="~{base :: .main-footer}" class="main-footer"></footer>
</body>
</html>
